  - date: '2026-06-03'
    rating: 3
    summary: >-
      Penn's official OpenData API is real but gated: documentation lives on a
      Penn-internal ESB host (esb.isc-seo.upenn.edu) that does not resolve from
      outside the network, and most services require a validated token. The
      strongest public, verifiable surface comes from Penn Labs, a student
      software organization that publishes open-source SDKs (Python at
      penn-sdk.readthedocs.io, Node at penn-sdk.js.org) and JSON REST APIs
      (Penn Courses, Penn Course Review) on GitHub. Penn Libraries publishes
      catalog metadata via OAI-PMH/Z39.50 under a documented open-metadata
      policy. No fabricated endpoints: every API entry maps to a live docs page
      probed below, and the gated OpenData host is reported honestly with its
      non-resolving status.
    endpoints:
