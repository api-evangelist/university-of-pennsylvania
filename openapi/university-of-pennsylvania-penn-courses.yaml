                          description: The title of the course, e.g. 'Programming Languages and Techniques
                            I' for CIS-120.
                        url:
                          type: url
                          description: The relative route through which this course's reviews can be accessed
                            (a prefix of `/api/review/` is assumed).
                  departments:
                    type: array
                    description: Data on departments for autocomplete.
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                          description: The string department code, e.g. `CIS` for the CIS department.
                        desc:
