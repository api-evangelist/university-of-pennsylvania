                  section_status:
                    type: string
                    readOnly: true
                    description: 'The current status of the watched section. Options and meanings: <table
                      width=100%><tr><td>"O"</td><td>"Open"</td></tr><tr><td>"C"</td><td>"Closed"</td></tr><tr><td>"X"</td><td>"Cancelled"</td></tr><tr><td>""</td><td>"Unlisted"</td></tr></table>'
          description: Registration detail successfully retrieved.
        '403':
          description: Access denied (missing or improper authentication).
        '404':
          description: Registration not found with given id.
      tags:
      - '[PCA] Registration'
    put:
      operationId: Update Registration
      description: '(PUT `/api/alert/registrations/{id}/`)


        Use this route to update existing PCA Registrations.  Note that the provided id does

        not always strictly specify which Registration gets modified.  In fact, the actual Registration

        that would get modified by a PUT request would be the head of the resubscribe chain of the

        Registration with the specified id (so if you try to update an outdated Registration it will

        instead update the most recent Registration).  The parameters which can be

        included in the request body are `resubscribe`, `auto_resubscribe`, ''close_notification'',

        `cancelled`, and `deleted`. If you include multiple parameters, the order of precedence in

        choosing what action to take is `resubscribe` > `deleted` > `cancelled` >

        [`auto_resubscribe` and `close_notification`] (so if you include multiple

        parameters only the action associated with the highest priority parameter will be executed,

        except both auto_resubscribe and close_notification can be updated in the same request).

        Note that close notifications CANNOT be sent by text so you shouldn''t allow the user to

        enable close notifications for any registration unless they have an email set in their

        User Profile or have push notifications enabled.  If you try to update a registration to

        enable close_notification and the user only has texts enabled, a 406 will be returned

        and the registration will not be created.

        Note that a registration will send an alert when the section it is watching opens, if and only

        if it hasn''t sent one before, it isn''t cancelled, and it isn''t deleted.  If a registration
        would

        send an alert when the section it is watching opens, we call it "active".  Registrations which

        have triggered an alert can be resubscribed to (which creates a new registration with the same

        settings and adds that to the end of the original registration''s resubscribe chain).  Triggered

        registrations would show up in List Registrations (as long as they are at the head of

        their resubscribe chain), even though they aren''t active.  Cancelled registrations can also

        be resubscribed to (in effect uncancelling), and also show up in List Registrations, despite

        not being active.  A user might cancel an alert rather than delete it if they want to keep it

        in their PCA manage console but don''t want to receive alerts for it.  Deleted registrations

        are not active, do not show up in List Registrations, and cannot be resubscribed to.  You can

        think of deleted registrations as effectively nonexistent; they are only kept on the backend

        for analytics purposes.  Note that while you can cancel a registration by setting the cancelled

        parameter to true in your PUT request (and the same for delete/deleted), you cannot uncancel

        or undelete (cancelled registrations can be resubscribed to and deleted registrations

        are effectively nonexistent).


        If the update is successful, a 200 is returned.  If there is some issue with the request,

        a 400 is returned.  This could be caused by trying to update a registration from a different

        semester, trying to resubscribe to a deleted registration, resubscribing to a registration

        which is not cancelled or hasn''t yet triggered a notification, cancelling a deleted or

        triggered registration, trying to make changes to a deleted registration, or otherwise

        breaking rules.  Look in the detail field of the response object for more detail on what

        exactly went wrong if you encounter a 400.  If no registration with the given id is found,

        a 404 is returned. If registration is not currently open on PCA, a 503 is returned.


        <span style="color:red;">User authentication required</span>.'
      parameters:
      - name: id
        in: path
        required: true
        description: A unique integer value identifying this registration.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  readOnly: true
                created_at:
                  type: string
                  format: date-time
                  readOnly: true
                  description: The datetime at which this registration was created.
                original_created_at:
                  type: string
                  format: date-time
                  readOnly: true
                  nullable: true
                  description: '

                    The datetime at which the tail of the resubscribe chain to which this registration
                    belongs

                    was created.  In other words, the datetime at which the user created the original

                    registration for this section, before resubscribing some number of times

                    (0 or more) to reach this registration.

                    '
                updated_at:
                  type: string
                  format: date-time
                  readOnly: true
                  description: The datetime at which this registration was last modified.
                section:
                  type: string
                  readOnly: true
                  description: The section that the user registered to be notified about.
                user:
                  type: string
                  readOnly: true
                  nullable: true
                  description: '

                    The User that registered for this alert. This object will be none if registration
                    occurred

                    before the PCA refresh of Spring 2020 (before the refresh user''s were only identified
                    by

                    their email and phone numbers, which are legacy fields in this model now). This object

                    might also be none if registration occurred through a 3rd part API such as Penn Course

                    Notify (now that Notify has fallen this is an unlikely event).

                    '
                cancelled:
                  type: boolean
                  description: '

                    Set this to true to cancel to this registration (making it inactive while keeping
                    it

                    in List Registration).

                    '
                cancelled_at:
                  type: string
                  format: date-time
                  readOnly: true
                  nullable: true
                  description: When was the registration cancelled? Null if it hasn't been cancelled.
                deleted:
                  type: boolean
                  description: '

                    Set this to true to delete this registration (making it inactive and preventing it
                    from

                    showing up in List Registrations).

                    '
                deleted_at:
                  type: string
                  format: date-time
                  readOnly: true
                  nullable: true
                  description: When was the registration deleted? Null if it hasn't been deleted.
                auto_resubscribe:
                  type: boolean
                  description: '

                    Set this to true to turn on auto resubscribe (causing the registration to automatically

                    resubscribe once it sends out a notification).

                    '
                notification_sent:
                  type: boolean
                  readOnly: true
                  description: True if an alert has been sent to the user, false otherwise.
                notification_sent_at:
                  type: string
                  format: date-time
                  readOnly: true
                  nullable: true
                  description: '

                    When was an alert sent to the user as a result of this registration?

                    Null if an alert was not sent.

                    '
                last_notification_sent_at:
                  type: string
                  readOnly: true
                  description: '

                    The last time the user was sent an opening notification for this registration''s

                    section. This property is None (or null in JSON) if no notification has been sent
                    to the

                    user for this registration''s section.


                    This is used on the frontend to tell the user a last time an alert was sent for

                    the SECTION of a certain registration in the manage alerts page. Since the idea of

                    Registration objects and resubscribe chains is completely abstracted out of the User''s

                    understanding, they expect alerts to work by section (so the "LAST NOTIFIED"

                    column should tell them the last time they were alerted about that section).

                    '
                close_notification:
                  type: boolean
                  description: "Defaults to false.  If set to true, the user will receive\n        a close\
                    \ notification (an alert when the section closes after an\n        alert was sent\
                    \ for it opening).\n"
                close_notification_sent:
                  type: boolean
                  readOnly: true
                  description: True if a close notification has been sent to the user, false otherwise.
                close_notification_sent_at:
                  type: string
                  format: date-time
                  readOnly: true
                  nullable: true
                  description: '

                    When was a close notification sent to the user as a result of this registration?

                    Null if a close notification was not sent.

                    '
                is_active:
                  type: string
                  readOnly: true
                  description: '

                    True if the registration would send an alert when the watched section changes to open,

                    False otherwise. This is equivalent to

                    [not(notification_sent or deleted or cancelled) and semester is current].

                    '
                is_waiting_for_close:
                  type: string
                  readOnly: true
                  description: '

                    True if the registration is waiting to send a close notification to the user

                    once the section closes.  False otherwise.

                    '
                resubscribe:
                  type: boolean
                  description: '

                    Set this to true to resubscribe to this registration (only works if the registration

                    has sent a notification and hasn''t been deleted).

                    '
      responses:
        '200':
          description: Registration successfully updated (or no changes necessary).
        '403':
          description: Access denied (missing or improper authentication).
        '400':
          description: Bad request (see route description).
        '404':
          description: Registration not found with given id.
        '503':
          description: Registration not currently open.
      tags:
      - '[PCA] Registration'
