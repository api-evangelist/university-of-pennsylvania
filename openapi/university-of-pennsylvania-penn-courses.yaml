  /api/base/friendship/:
    get:
      operationId: List Friendships
      description: '(GET `/api/base/friendship/`)


        Get a list of all friendships and friendship requests (sent and recieved) for the

        specified user. Filter the list by status (accepted, sent) to distinguish between

        friendships and friendship requests.


        <span style="color:red;">User authentication required</span>.'
      parameters: []
      responses:
        '200':
          description: Friendships retrieved successfully.
        '403':
          description: Access denied (missing or improper authentication).
      tags:
      - '[PCx] Friendship'
    post:
      operationId: Create Friendship
      description: '(POST `/api/base/friendship/`)


        Create a friendship between two users (sender and recipient). If a previous request does

        not exist between the two friendships, then we create friendship request. If a previous request

        exists (where the recipient is the sender) and the recipient of a request hits this route, then

        we accept the request.


        <span style="color:red;">User authentication required</span>.'
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pennkey:
                  type: string
                  description: The Pennkey of the user you are sending a friend request to or handling
                    a request from.
                  required: true
      responses:
        '201':
          description: Friendship request created successfully.
        '403':
          description: Access denied (missing or improper authentication).
        '200':
          description: Friendship request accepted successfully.
        '404':
          description: Username was None/ Username did not exist.
        '409':
          description: Friendship request already exists
      tags:
      - '[PCx] Friendship'
    delete:
      operationId: Destroy Friendship
      description: '(DELETE `/api/base/friendship/`)


        Delete a friendship between two users (sender and recipient). If there exists only

        a friendship request between two users, then we either delete the friendship request

        if the sender hits the route, or we reject the request if the recipient hits this route.


        <span style="color:red;">User authentication required</span>.'
      parameters:
      - name: pennkey
        in: query
        description: The Pennkey of the user you are ending/rejecting your friendship/friend request with.
        schema:
          type: string
        required: true
      responses:
        '204':
          description: ''
        '403':
          description: Access denied (missing or improper authentication).
        '200':
          description: Friendship rejected/deleted/cancelled successfully.
        '404':
          description: Friendship does not exist or Username does not exist.
        '409':
          description: Friendship request already rejected.
      tags:
      - '[PCx] Friendship'
  /api/plan/recommendations/:
    post:
      operationId: Create Course Recommendations
      description: '(POST `/api/plan/recommendations/`)


        This route will optionally take in current and past courses. In order to

        make recommendations solely on the user''s courses in past and current PCP schedules, simply

        omit both the curr_courses and past_courses fields in your request.

        Otherwise, in order to specify past and current courses,

        include a "curr-courses" and/or "past_courses" attribute in the request that should each contain

        an array of string course full codes of the form DEPT-XXX (e.g. CIS-120).

        If successful, this route will return a list of recommended courses, with the same schema

        as the List Courses route, starting with the most relevant course. The number of

        recommended courses returned can be specified using the n_recommendations attribute in the

        request body, but if this attribute is omitted, the default will be 5.

        If n_recommendations is not an integer, or is <=0, a 400 will be returned.

        If curr_courses contains repeated courses or invalid courses or non-current courses, a

        400 will be returned.

        If past_courses contains repeated courses or invalid courses, a 400 will be returned.

        If curr_courses and past_courses contain overlapping courses, a 400 will be returned.


        <span style="color:red;">User authentication required</span>.'
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                curr_courses:
                  type: array
                  description: An array of courses the user is currently planning to take, each specified
                    by its string full code, of the form DEPT-XXXX, e.g. CIS-1200.
                  items:
                    type: string
                past_courses:
                  type: array
                  description: An array of courses the user has previously taken, each specified by its
                    string full code, of the form DEPT-XXXX, e.g. CIS-1200.
                  items:
                    type: string
                n_recommendations:
                  type: integer
                  description: The number of course recommendations you want returned. Defaults to 5.
      responses:
        '403':
          description: Access denied (missing or improper authentication).
        '200':
          description: Response returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      readOnly: true
                      description: '

                        The full code of the course, in the form ''{dept code}-{course code}''

                        dash-joined department and code of the course, e.g. `CIS-120` for CIS-120.'
                    title:
                      type: string
                      readOnly: true
                      description: '

                        The title of the course, e.g. ''Programming Languages and Techniques I'' for CIS-120.

                        '
                    description:
                      type: string
                      readOnly: true
                      description: '

                        The description of the course, e.g. ''A fast-paced introduction to the fundamental
                        concepts

                        of programming... [etc.]'' for CIS-120.

                        '
                    semester:
                      type: string
                      readOnly: true
                      description: '

                        The semester of the course (of the form YYYYx where x is A [for spring],

                        B [summer], or C [fall]), e.g. `2019C` for fall 2019.

                        '
                    num_sections:
                      type: integer
                      readOnly: true
                      description: The number of sections for this course.
                    course_quality:
                      type: number
                      multipleOf: 0.001
                      maximum: 10
                      minimum: -10
                      readOnly: true
                      description: The average course quality rating for this section, on a scale of 0-4.
                    instructor_quality:
                      type: number
                      multipleOf: 0.001
                      maximum: 10
                      minimum: -10
                      readOnly: true
                      description: The average instructor quality for this section, on a scale of 0-4.
                    difficulty:
                      type: number
                      multipleOf: 0.001
                      maximum: 10
                      minimum: -10
                      readOnly: true
                      description: The average difficult rating for this section, on a scale of 0-4.
                    work_required:
                      type: number
                      multipleOf: 0.001
                      maximum: 10
                      minimum: -10
                      readOnly: true
                      description: The average work required for this section, on a scale of 0-4.
                    recommendation_score:
                      type: number
                      multipleOf: 0.001
                      maximum: 10
                      minimum: -10
                      readOnly: true
                      description: '

                        The recommendation score for this course if the user is logged in, or null if
                        the

                        the user is not logged in.'
                    credits:
                      type: number
                      multipleOf: 0.01
                      maximum: 100
                      minimum: -100
                      readOnly: true
                      nullable: true
                      description: The number of credits this course takes. This is precomputed for efficiency.
        '400':
          description: Invalid curr_courses, past_courses, or n_recommendations (see response).
      tags:
      - '[PCP] Course Recommendations'
