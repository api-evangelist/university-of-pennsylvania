  /api/review/course_plots/{course_code}:
    get:
      operationId: Retrieve Plots
      description: '(GET `/api/review/course_plots/{course_code}`)


        Get all PCR plots for a given course.


        <span style="color:red;">User authentication required</span>.'
      parameters:
      - name: course_code
        in: path
        description: The dash-joined department and code of the course you want plots for, e.g. `CIS-120`
          for CIS-120.
        schema:
          type: string
        required: true
      - name: semester
        in: query
        description: Optionally specify the semester of the desired course (defaults to most recent course
          with the specified course code).
        schema:
          type: string
        required: false
      - name: instructor_ids
        in: query
        description: A comma-separated list of instructor IDs with which to filter the sections underlying
          the returned plots.Note that if only invalid instructor IDs are present, plot response fields
          will be null or 0.
        schema:
          type: string
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: string
                    description: The dash-joined department and most-recent (across all codes representing
                      the topic) code of the course, e.g. `CIS-120` for CIS-120.
                  current_add_drop_period:
                    type: object
                    description: The start and end dates of the upcoming/current semester's add/drop period
                    properties:
                      start:
                        type: string
                        description: A string datetime representation of the start of the current/upcoming
                          add/drop period.
                      end:
                        type: string
                        description: A string datetime representation of the end of the current/upcoming
                          add/drop period.
                  average_plots:
                    type: object
                    description: This course's plots (PCA demand, percent sections open), averaged across
                      all of its sections from all semesters. Note that if any of these subfields are
                      missing or null, that means the subfield is not applicable or missing from our data
                      (you should check for null values).
                    properties:
                      rSemesterCalc:
                        type: string
                        description: The oldest semester included in these review aggregations (of the
                          form YYYYx where x is A [for spring], B [summer], or C [fall]), e.g. `2019C`
                          for fall 2019. This field will not be missing.
                      rSemesterCount:
                        type: integer
                        description: The number of semesters included in these review aggregations. This
                          field will not be missing.
                      rInstructorQuality:
                        type: number
                        description: Average Instructor Quality
                      rCourseQuality:
                        type: number
                        description: Average Course Quality
                      rCommunicationAbility:
                        type: number
                        description: Average Comm. Ability
                      rStimulateInterest:
                        type: number
                        description: Average Stimulate Ability
                      rInstructorAccess:
                        type: number
                        description: Average Instructor Access
                      rDifficulty:
                        type: number
                        description: Average Difficulty
                      rWorkRequired:
                        type: number
                        description: Average Work Required
                      rTaQuality:
                        type: number
