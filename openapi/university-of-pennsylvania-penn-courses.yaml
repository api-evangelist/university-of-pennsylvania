components:
  schemas:
    User:
      type: object
      properties:
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_ only.
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        profile:
          type: object
          properties:
            email:
              type: string
              format: email
              nullable: true
              description: The email of the User. Defaults to null.
              maxLength: 254
            phone:
              type: string
              nullable: true
              description: '

                The phone number of the user. Defaults to null.

                The phone number will be stored in the E164 format, but any form parseable by the

                [phonenumbers library](https://pypi.org/project/phonenumbers/)

                will be accepted and converted to E164 format automatically upon saving.

                '
              maxLength: 100
            push_notifications:
              type: boolean
              description: '

                Defaults to False, changed to True if the User enables mobile push notifications

                for PCA, rather than text notifications.

                '
          description: The user profile object, storing collected info about the user.
    Schedule:
      type: object
      properties:
        id:
          type: integer
          description: The id of the schedule.
        sections:
          type: array
          items: []
          description: The sections in the schedule.
        breaks:
          type: array
          items: []
          description: The breaks in the schedule.
        semester:
          type: string
          description: '

            The academic semester planned out by the schedule (of the form YYYYx where x is A

            [for spring], B [summer], or C [fall]), e.g. `2019C` for fall 2019.

            '
          maxLength: 5
        name:
          type: string
          description: '

            The user''s nick-name for the schedule. No two schedules can match in all of the fields

            `[name, semester, person]`

            '
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - sections
      - name
    PrimarySchedule:
      type: object
      properties:
        user:
          type: object
          properties:
            username:
              type: string
              readOnly: true
              description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_ only.
            first_name:
              type: string
              maxLength: 150
            last_name:
              type: string
              maxLength: 150
          readOnly: true
          description: The user to which the primary schedule belongs.
        schedule:
          type: object
          properties:
            id:
              type: integer
              description: The id of the schedule.
            sections:
              type: array
              items: []
              description: The sections in the schedule.
            breaks:
              type: array
              items: []
              description: The breaks in the schedule.
            semester:
              type: string
              description: '

                The academic semester planned out by the schedule (of the form YYYYx where x is A

                [for spring], B [summer], or C [fall]), e.g. `2019C` for fall 2019.

                '
              maxLength: 5
            name:
              type: string
              description: '

                The user''s nick-name for the schedule. No two schedules can match in all of the fields

                `[name, semester, person]`

                '
              maxLength: 255
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true
          required:
          - sections
          - name
          readOnly: true
          description: The primary schedule.
    Break:
      type: object
      properties:
        id:
          type: integer
          description: The id of the schedule.
        meetings:
          type: string
          readOnly: true
          description: '

            A list of the meetings of this section (each meeting is a continuous span of time

            during which a section would meet).

            '
        location_string:
          type: string
          nullable: true
          description: '

            This represents the location that the user can input themselves.

            Will use a building object from a drop down or have it validated

            or something so it can interact with map.

            Didn''t want to run into issue of users creating arbitrary

            Room objects, so just using a char field

            '
          maxLength: 80
        name:
          type: string
          description: '

            The user''s name for the break. No two breaks can match in all of the fields

            `[name, person]`

            '
          maxLength: 255
        checked:
          type: boolean
          description: '

            Whether or not the break has been checked by the user. This is used to

            determine if the break should be displayed in the user''s schedule.

            '
        meeting_times:
          type: string
          description: '

            A JSON-stringified list of meeting times of the form

            `{days code} {start time} - {end time}`, e.g.

            `["MWF 09:00 AM - 10:00 AM","F 11:00 AM - 12:00 PM","T 05:00 PM - 06:00 PM"]` for

            PHYS-151-001 (2020A). Each letter of the days code is of the form M, T, W, R, F for each

            day of the work week, respectively (and multiple days are combined with concatenation).

            To access the Meeting objects for this section, the related field `meetings` can be used.

            '
      required:
      - name
    Registration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: The datetime at which this registration was created.
        original_created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: '

            The datetime at which the tail of the resubscribe chain to which this registration belongs

            was created.  In other words, the datetime at which the user created the original

            registration for this section, before resubscribing some number of times

            (0 or more) to reach this registration.

            '
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: The datetime at which this registration was last modified.
        section:
          type: string
          description: The dash-separated full code of the section associated with this Registration.
        user:
          type: string
          readOnly: true
          description: The Penn Labs Accounts username of the User who owns this Registration.
        cancelled:
          type: boolean
          readOnly: true
          description: '

            Defaults to False, changed to True if the registration has been cancelled. A cancelled

            registration will not trigger any alerts to be sent even if the relevant section opens.

            A cancelled section can be resubscribed to (unlike deleted alerts), and will show up

            on the manage alerts page on the frontend (also unlike deleted alerts). Note that once

            a registration is cancelled, it cannot be uncancelled (resubscribing creates a new

            registration which is accessible via the resubscribed_to field, related name of

            resubscribed_from).

            '
        cancelled_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When was the registration cancelled? Null if it hasn't been cancelled.
        deleted:
          type: boolean
          readOnly: true
          description: '

            Defaults to False, changed to True if the registration has been deleted. A deleted

            registration will not trigger any alerts to be sent even if the relevant section opens.

            A deleted section cannot be resubscribed to or undeleted, and will not show up on the

            manage alerts page on the frontend. It is kept in the database for analytics purposes,

            even though it serves no immediate functional purpose for its original user.

            '
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When was the registration deleted? Null if it hasn't been deleted.
        auto_resubscribe:
          type: boolean
          readOnly: true
          description: '

            Defaults to False, in which case a registration will not be automatically resubscribed

            after it triggers an alert to be sent (but the user can still resubscribe to a sent alert,

            as long as it is not deleted). If set to True, the registration will be automatically

            resubscribed to once it triggers an alert to be sent (this is useful in the case of

            volatile sections which are opening and closing frequently, often before the user has

            time to register).

            '
        notification_sent:
          type: boolean
          readOnly: true
          description: True if an alert has been sent to the user, false otherwise.
        notification_sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: '

            When was an alert sent to the user as a result of this registration?

            Null if an alert was not sent.

            '
        last_notification_sent_at:
          type: string
          readOnly: true
          description: '

            The last time the user was sent an opening notification for this registration''s

            section. This property is None (or null in JSON) if no notification has been sent to the

            user for this registration''s section.


            This is used on the frontend to tell the user a last time an alert was sent for

            the SECTION of a certain registration in the manage alerts page. Since the idea of

            Registration objects and resubscribe chains is completely abstracted out of the User''s

            understanding, they expect alerts to work by section (so the "LAST NOTIFIED"

            column should tell them the last time they were alerted about that section).

            '
        close_notification:
          type: boolean
          readOnly: true
          description: "Defaults to false.  If set to true, the user will receive\n        a close notification\
            \ (an alert when the section closes after an\n        alert was sent for it opening).\n"
        close_notification_sent:
          type: boolean
          readOnly: true
          description: True if a close notification has been sent to the user, false otherwise.
        close_notification_sent_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: '

            When was a close notification sent to the user as a result of this registration?

            Null if a close notification was not sent.

            '
        is_active:
          type: string
          readOnly: true
          description: '

            True if the registration would send an alert when the watched section changes to open,

            False otherwise. This is equivalent to

            [not(notification_sent or deleted or cancelled) and semester is current].

            '
        is_waiting_for_close:
          type: string
          readOnly: true
          description: '

            True if the registration is waiting to send a close notification to the user

            once the section closes.  False otherwise.

            '
        section_status:
          type: string
          readOnly: true
          description: 'The current status of the watched section. Options and meanings: <table width=100%><tr><td>"O"</td><td>"Open"</td></tr><tr><td>"C"</td><td>"Closed"</td></tr><tr><td>"X"</td><td>"Cancelled"</td></tr><tr><td>""</td><td>"Unlisted"</td></tr></table>'
    DegreePlanList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
