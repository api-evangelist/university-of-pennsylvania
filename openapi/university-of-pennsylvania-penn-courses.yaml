      description: '(GET `/api/base/{semester}/pre-ngss-requirements/`)


        Retrieve a list of all pre-NGSS (deprecated since 2022B) academic requirements

        in the database for this semester.'
      parameters:
      - name: semester
        in: path
        required: true
        description: The semester of the requirement (of the form YYYYx where x is A [for spring], B [summer],
          or C [fall]), e.g. `2019C` for fall 2019. We organize requirements by semester so that we don't
          get huge related sets which don't give particularly good info.
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      readOnly: true
                      description: A string representation of the requirement, in the form '{code}@{school}'
                    code:
                      type: string
